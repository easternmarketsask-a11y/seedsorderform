<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東方蔬菜種子預訂</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a3a2a;
            --primary-light: #2d5a3d;
            --bg: #f5f0e8;
            --accent: #c0392b;
            --gold: #c8a84b;
            --text: #1a1a1a;
            --white: #ffffff;
            --border: #e0d8cc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 90px;
        }
        header {
            background: white;
            padding: 14px 16px 12px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            border-bottom: 3px solid var(--primary);
        }
        header .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        header .logo-row img {
            height: 54px;
            width: auto;
            border-radius: 6px;
        }
        header h1 {
            font-family: 'Noto Serif TC', serif;
            color: var(--primary);
            font-size: 20px;
            letter-spacing: 2px;
            margin: 0;
        }
        header p { color: #4a8c5c; font-size: 12px; letter-spacing: 1px; margin-top: 3px; }

        .container { max-width: 640px; margin: 0 auto; padding: 12px; }

        /* 姓名 */
        .user-box {
            background: var(--white);
            border-radius: 10px;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .user-box label { font-size: 14px; font-weight: 500; color: var(--primary); white-space: nowrap; }
        .user-box input {
            flex: 1; border: none; outline: none;
            font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
            border-bottom: 1.5px solid var(--border); padding: 4px 0;
            background: transparent; transition: border-color 0.2s;
        }
        .user-box input:focus { border-color: var(--primary-light); }

        /* 分類 */
        .cat-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 15px; font-weight: 700;
            color: var(--primary);
            padding: 8px 4px 6px;
            border-bottom: 2px solid var(--primary-light);
            margin: 16px 0 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .cat-title::before {
            content: '';
            width: 4px; height: 18px;
            background: var(--primary-light);
            border-radius: 2px;
        }

        /* 種子格子 */
        .seed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 4px;
        }
        .item {
            background: var(--white);
            border-radius: 10px;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            display: flex; flex-direction: column; gap: 8px;
            position: relative; overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .item.active {
            border-color: var(--primary-light);
            background: #f0f8f3;
            box-shadow: 0 2px 10px rgba(45,90,61,0.15);
        }
        .new-badge {
            position: absolute; top: 0; right: 0;
            background: var(--accent); color: white;
            font-size: 9px; padding: 2px 6px;
            border-radius: 0 10px 0 8px;
            font-weight: 600; letter-spacing: 0.5px;
        }
        .name { font-size: 13px; font-weight: 500; color: var(--primary); line-height: 1.3; }
        .stepper { display: flex; align-items: center; gap: 6px; }
        .btn-s {
            width: 26px; height: 26px; border-radius: 50%;
            border: 1.5px solid var(--primary-light);
            background: white; color: var(--primary);
            font-size: 16px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            user-select: none; line-height: 1;
        }
        .btn-s:active { background: var(--border); }
        .count {
            min-width: 28px; text-align: center;
            font-size: 15px; font-weight: 700; color: var(--primary);
        }
        .unit { font-size: 11px; color: #888; }

        /* 底部 */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
            z-index: 100;
        }
        .selected-info { flex: 1; font-size: 13px; color: #888; }
        .selected-info span { color: var(--primary-light); font-weight: 700; font-size: 16px; }
        .btn-send {
            background: var(--primary); color: white; border: none;
            border-radius: 24px; padding: 11px 28px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 14px; font-weight: 500;
            cursor: pointer; letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-send:active { background: var(--primary-light); }

        /* 成功頁 */
        #success {
            display: none; text-align: center;
            padding: 60px 20px;
        }
        #success h2 {
            font-family: 'Noto Serif TC', serif;
            color: var(--primary); font-size: 24px; margin-bottom: 12px;
        }
        #success p { color: #666; margin-bottom: 24px; }
        .receipt {
            background: white; border: 1px dashed #ccc;
            border-radius: 10px; padding: 20px;
            text-align: left; max-width: 400px;
            margin: 0 auto 24px; line-height: 2;
            font-size: 14px;
        }
        .receipt-row { display: flex; justify-content: space-between; }
        .receipt-divider { border: none; border-top: 1px dashed #ddd; margin: 10px 0; }
        .btn-back {
            border: 1.5px solid var(--primary); background: none;
            color: var(--primary); padding: 10px 28px;
            border-radius: 24px; font-size: 14px; cursor: pointer;
        }
    </style>
</head>

        { name: "白不老架豆" }, { name: "四季豆" }, { name: "長豇豆" },
        { name: "青扁芸豆" }, { name: "大蔥" }, { name: "細香蔥" },
        { name: "九層塔" }, { name: "秋葵" }, { name: "榨菜" },
        { name: "落葵" }, { name: "韭菜" }, { name: "西洋菜" }
    ]}
];

const counts = {};
const content = document.getElementById('seed-content');

// 渲染種子列表
seedData.forEach(cat => {
    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = cat.cat;
    content.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'seed-grid';

    cat.items.forEach(item => {
        counts[item.name] = 0;
        const card = document.createElement('div');
        card.className = 'item';
        card.id = 'card-' + item.name;

        if (item.isNew) {
            const badge = document.createElement('div');
            badge.className = 'new-badge';
            badge.textContent = 'NEW';
            card.appendChild(badge);
        }

        const nameEl = document.createElement('div');
        nameEl.className = 'name';
        nameEl.textContent = item.name;

        const stepper = document.createElement('div');
        stepper.className = 'stepper';
        stepper.innerHTML = `
            <button class="btn-s" onclick="change('${item.name}',-1)">−</button>
            <span class="count" id="c-${item.name}">0</span>
            <button class="btn-s" onclick="change('${item.name}',1)">+</button>
            <span class="unit">包</span>`;

        card.appendChild(nameEl);
        card.appendChild(stepper);
        grid.appendChild(card);
    });

    content.appendChild(grid);
});

function change(name, d) {
    counts[name] = Math.max(0, counts[name] + d);
    document.getElementById('c-' + name).textContent = counts[name];
    const card = document.getElementById('card-' + name);
    counts[name] > 0 ? card.classList.add('active') : card.classList.remove('active');
    updateCount();
}

function updateCount() {
    const n = Object.values(counts).filter(v => v > 0).length;
    document.getElementById('sel-count').textContent = n;
}

function submitOrder() {
    const user = document.getElementById('username').value.trim();
    if (!user) { alert('請填寫姓名'); return; }

    const selected = Object.entries(counts).filter(([, v]) => v > 0);
    if (selected.length === 0) { alert('請至少選擇一種種子'); return; }

    // 打包成一段文字提交到「訂單詳情」欄位
    const now = new Date();
    const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    let summary = `【${date}】姓名：${user} ｜ `;
    selected.forEach(([n, v]) => { summary += `${n}×${v}包 `; });

    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdQXYZvIHmu4QtXrueO-wNNk9myMAW4fuZ79o95pihIDP48yA/formResponse';
    const formData = new URLSearchParams();
    formData.append('entry.508602451', summary);

    fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: formData })
        .then(() => {
            // 顯示成功頁
            document.getElementById('app').style.display = 'none';
            const total = selected.reduce((s, [, v]) => s + v, 0);
            let html = `<div class="receipt-row"><span><b>訂購人</b></span><span>${user}</span></div>
                        <div class="receipt-row"><span><b>日期</b></span><span>${date}</span></div>
                        <hr class="receipt-divider">`;
            selected.forEach(([n, v]) => {
                html += `<div class="receipt-row"><span>${n}</span><span>${v} 包</span></div>`;
            });
            html += `<hr class="receipt-divider">
                     <div class="receipt-row"><span><b>合計</b></span><span><b>${selected.length} 種 / ${total} 包</b></span></div>`;
            document.getElementById('receipt').innerHTML = html;
            document.getElementById('success').style.display = 'block';
            window.scrollTo(0, 0);
        })
        .catch(() => alert('提交失敗，請檢查網絡後重試'));
}
</script>
